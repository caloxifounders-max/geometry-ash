<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>GD Mobile Fix</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; background: #15a; width: 100vw; height: 100vh; }
    </style>
</head>
<body ontouchstart="jump(event)">
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // Better resolution handling for iPhone Retina screens
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);

        let player = { x: 50, y: 0, size: 30, dy: 0, jump: -10, gravity: 0.6, grounded: false };
        let floor = window.innerHeight * 0.7;
        let obstacles = [];

        function jump(e) {
            e.preventDefault(); // Prevents the browser from scrolling/zooming
            if (player.grounded) {
                player.dy = player.jump;
                player.grounded = false;
            }
        }

        function loop() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y > floor - player.size) {
                player.y = floor - player.size;
                player.dy = 0;
                player.grounded = true;
            }

            // Draw Ground
            ctx.fillStyle = "white";
            ctx.fillRect(0, floor, window.innerWidth, 5);

            // Draw Player
            ctx.fillStyle = "#0ff";
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Obstacles
            if (Math.random() < 0.01) {
                obstacles.push({ x: window.innerWidth, w: 30, h: 30 });
            }

            ctx.fillStyle = "#f33";
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= 7; // Increased speed for better "feel"

                // Draw Spike
                ctx.beginPath();
                ctx.moveTo(obs.x, floor);
                ctx.lineTo(obs.x + obs.w/2, floor - obs.h);
                ctx.lineTo(obs.x + obs.w, floor);
                ctx.fill();

                // Hit Detection
                if (player.x < obs.x + obs.w && player.x + player.size > obs.x && player.y + player.size > floor - obs.h) {
                    obstacles = []; // Reset instead of reload for less lag
                }
                
                if (obs.x < -50) obstacles.splice(i, 1);
            }

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
