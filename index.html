<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GD Clone v1</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #007aff; border-bottom: 5px solid #fff; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body onclick="jump()">
    <div id="ui">Tap to Jump!</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = 400;

        let player = { x: 50, y: 300, size: 30, dy: 0, gravity: 0.6, jumpPower: -12, grounded: false };
        let obstacles = [{ x: 500, w: 30, h: 30 }];
        let gameSpeed = 5;

        function jump() {
            if (player.grounded) {
                player.dy = player.jumpPower;
                player.grounded = false;
            }
        }

        function update() {
            // Physics
            player.dy += player.gravity;
            player.y += player.dy;

            // Ground Collision
            if (player.y > 300) {
                player.y = 300;
                player.dy = 0;
                player.grounded = true;
            }

            // Move obstacles
            obstacles.forEach(obs => {
                obs.x -= gameSpeed;
                if (obs.x < -50) obs.x = canvas.width + Math.random() * 300;
                
                // Simple Collision Detection
                if (player.x < obs.x + obs.w && player.x + player.size > obs.x &&
                    player.y < 300 + obs.h && player.y + player.size > 300) {
                    resetGame();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Player
            ctx.fillStyle = "#fff";
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // Draw Obstacles (Triangles)
            ctx.fillStyle = "#ff3b30";
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.moveTo(obs.x, 330);
                ctx.lineTo(obs.x + obs.w/2, 330 - obs.h);
                ctx.lineTo(obs.x + obs.w, 330);
                ctx.fill();
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function resetGame() {
            player.y = 300;
            obstacles[0].x = canvas.width;
        }

        draw();
    </script>
</body>
</html>
