<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stereo Madness v1</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #512da8; } /* Purple/Blue background */
        #progress { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body ontouchstart="jump(event)">
    <div id="progress">0%</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);

        let player = { x: 100, y: 0, size: 30, dy: 0, jump: -11, gravity: 0.7, rotation: 0 };
        let floor = window.innerHeight * 0.7;
        let gameActive = true;
        let distance = 0;

        // Level Data: X position of spikes (distance from start)
        const stereoMadness = [400, 700, 1000, 1300, 1600, 1800, 2100, 2400]; 

        function jump(e) {
            if(e) e.preventDefault();
            if (player.y >= floor - player.size - 1) {
                player.dy = player.jump;
            }
        }

        function loop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            distance += 6; // Move forward

            // Update Progress
            const percent = Math.min(100, Math.floor((distance / 2500) * 100));
            document.getElementById('progress').innerText = percent + "%";

            // Physics
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y > floor - player.size) {
                player.y = floor - player.size;
                player.dy = 0;
                // Snap rotation to 90 degrees when landing
                player.rotation = Math.round(player.rotation / 90) * 90;
            } else {
                player.rotation += 5; // Rotate while in air
            }

            // Draw Ground
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, floor, window.innerWidth, 5);

            // Draw Player with Rotation
            ctx.save();
            ctx.translate(player.x + player.size/2, player.y + player.size/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = "#0ff";
            ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
            ctx.restore();

            // Draw Level Spikes
            ctx.fillStyle = "#f33";
            stereoMadness.forEach(spikeX => {
                let relativeX = spikeX - distance + player.x;
                
                if (relativeX > -50 && relativeX < window.innerWidth) {
                    ctx.beginPath();
                    ctx.moveTo(relativeX, floor);
                    ctx.lineTo(relativeX + 15, floor - 30);
                    ctx.lineTo(relativeX + 30, floor);
                    ctx.fill();

                    // Collision detection
                    if (player.x < relativeX + 25 && player.x + 25 > relativeX && player.y + player.size > floor - 25) {
                        gameActive = false;
                        setTimeout(() => location.reload(), 500);
                    }
                }
            });

            if (percent < 100) requestAnimationFrame(loop);
            else alert("Level Complete!");
        }

        loop();
    </script>
</body>
</html>
